<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HitTheBell - Pricing</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f7f4ee;
        color: #1c1914;
      }
      header {
        padding: 24px 20px 8px;
      }
      main {
        padding: 0 20px 32px;
        max-width: 720px;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 6px;
      }
      p {
        line-height: 1.6;
      }
      .card {
        border: 1px solid #ddd4c6;
        background: #fffaf1;
        border-radius: 12px;
        padding: 16px;
        margin-top: 16px;
      }
      .muted {
        color: #6d6457;
        font-size: 13px;
      }
      a {
        color: #b7382d;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Pricing</h1>
      <p class="muted">Updated: March 24, 2026</p>
    </header>
    <main>
      <div class="card">
        <p><strong>Free Trial</strong>: 7 days</p>
        <p><strong>Plan</strong>: Add your pricing details here.</p>
        <p class="muted">
          Replace this section with your final subscription price, billing
          cadence, and any tax details.
        </p>
      </div>
      <p>
        <a href="./index.html">Back to Legal</a>
      </p>
    </main>
  </body>
</html>
